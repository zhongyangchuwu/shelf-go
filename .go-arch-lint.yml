version: 3
workdir: internal

allow:
  depOnAnyVendor: false
  deepScan: true

excludeFiles:
  - "^.*_test\\.go$"

vendors:
  cobra:
    in: github.com/spf13/cobra
  term:
    in: golang.org/x/term
  yaml:
    in: gopkg.in/yaml.v3
  age:
    in:
      - filippo.io/age
      - filippo.io/age/**
  flock:
    in: github.com/gofrs/flock

components:
  cli:
    in: cli
  app:
    in: app
  manager:
    in: manager
  project:
    in: project
  secret:
    in: secret
  source:
    in: source
  vault:
    in: vault
  vaultfile:
    in: vaultfile
  vaultcrypto:
    in: vaultcrypto
  importer_gopass:
    in: importer/gopass
  config:
    in: config
  util:
    in: util

deps:
  cli:
    mayDependOn:
      - app
      - project
      - manager
    canUse:
      - cobra
      - term

  manager:
    mayDependOn:
      - app

  app:
    mayDependOn:
      - config
      - project
      - secret
      - source
      - vault
      - vaultfile
      - importer_gopass
      - util
      - vaultcrypto

  project:
    mayDependOn:
      - source
      - util

  secret:
    mayDependOn:
      - vault

  source:
    mayDependOn:
      - util

  vault:
    mayDependOn:
      - source
      - util

  vaultfile:
    mayDependOn:
      - vault
      - vaultcrypto
      - util
    canUse:
      - flock

  vaultcrypto:
    canUse:
      - age


  config:
    mayDependOn: []
    canUse:
      - yaml
